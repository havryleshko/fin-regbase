- id: E014
  question: >
    What is the maximum time a firm regulated under DISP has to issue a final
    response to a complaint, and how does this differ for payment service
    providers and e-money issuers?
  difficulty: easy
  type: factual
  expected_pages:
    - complaints-handling-framework
    - disp1-treating-complainants-fairly
  required_facts:
    - "The standard deadline for a final response is 8 weeks from the date the complaint was received"
    - "For payment service providers and e-money issuers responding to complaints about payment services, the deadline is 15 business days"
    - "In exceptional circumstances, PSPs and EMIs may extend to 35 business days — but must notify the customer within the 15-business-day period explaining the delay and the new deadline"
    - "The 3-business-day track is available for all firms where a complaint can be resolved by close of the third business day after receipt — a summary resolution communication may be issued instead of a final response letter"
    - "These are hard outer limits — a firm cannot extend beyond them unilaterally"
  required_citations:
    - "DISP 1.6.2R (8-week standard)"
    - "DISP 1.6.2AR (15 business days for PSPs/EMIs)"
    - "DISP 1.5 (3-business-day track)"
  tags: [DISP, complaints, PSR, EMI, timeline]

- id: M018
  question: >
    A firm's complaints data shows a pattern of customers complaining about the
    same feature of a product. DISP 1 contains a specific hard rule about what
    the firm must do in response. What is it?
  difficulty: medium
  type: factual
  expected_pages:
    - complaints-handling-framework
    - disp1-treating-complainants-fairly
  required_facts:
    - "DISP 1.3.3R imposes a hard rule: where a firm identifies recurring or systemic problems from complaints data, it must analyse the root cause of those problems"
    - "The root cause analysis obligation extends beyond the products or services that have actually been complained about — it applies to other products or services that may have the same underlying problem even if no complaints have yet been received about them"
    - "Where root cause analysis reveals that customers who have not complained may have suffered detriment, the firm must consider whether to take proactive steps to contact those customers and offer appropriate redress"
    - "This obligation applies even if the affected customers have not complained and the firm has not received any FCA direction to review"
    - "The analysis must feed into management information and be reported to senior management"
  required_citations:
    - "DISP 1.3.3R (root cause analysis)"
  tags: [DISP, complaints, root-cause-analysis, proactive-redress]

- id: M019
  question: >
    A motor finance customer received a final response letter from their lender
    in March 2025 about a complaint relating to a discretionary commission
    arrangement on a pre-2021 agreement. How long does the customer have to
    refer the complaint to the Financial Ombudsman Service?
  difficulty: medium
  type: edge-case
  expected_pages:
    - disp-app5-motor-finance-dca-complaints
    - disp2-fos-jurisdiction
  required_facts:
    - "The standard FOS referral window of 6 months from the date of the final response letter does not apply to this complaint"
    - "Under DISP App 5, the FOS referral window for DCA motor finance complaints is extended to 15 months from the date of the final response — or until 30 July 2026, whichever is later"
    - "A final response sent in March 2025 falls within the extended period (11 January 2024 to 31 May 2026) — the 15-month extended window applies"
    - "The final response letter itself must substitute the standard '6 months' wording with '15 months' throughout — if the letter used the standard wording, the firm has not complied with DISP App 5.2.11R"
    - "Records relating to the complaint must be retained until 11 April 2031 regardless of when the complaint was received or resolved"
  required_citations:
    - "DISP App 5.2.2R (extended FOS referral window)"
    - "DISP App 5.2.11R (mandatory wording substitution)"
    - "DISP 2.8.2R (standard 6-month rule, disapplied here)"
  tags: [DISP, motor-finance, DCA, FOS, complaints]

- id: H012
  question: >
    A small business with annual turnover of £5m submits a complaint to a firm
    about a payment services dispute. The firm argues the business is not an
    'eligible complainant' because it is a commercial entity, not a consumer.
    Is the firm correct?
  difficulty: hard
  type: boundary
  expected_pages:
    - fos-eligible-complainants
    - disp2-fos-jurisdiction
  required_facts:
    - "No — the firm is incorrect"
    - "The eligible complainant definition includes 'small businesses' with an annual turnover of less than £6.5m at the time of referral to FOS — a business with £5m turnover qualifies"
    - "The FCA's position is that where there is any doubt about whether a complainant is eligible, the FOS determines eligibility — not the respondent firm (DISP 2.7.5G)"
    - "The firm cannot unilaterally decide that a complainant is not eligible and refuse to handle the complaint accordingly"
    - "Eligible complainant categories include: consumers, micro-enterprises, small charities (income < £6.5m), small businesses (turnover < £6.5m at referral), trustees (net assets < £5m), and certain guarantors"
  required_citations:
    - "DISP 2.7.3R (eligible complainant definition)"
    - "DISP 2.7.5G (doubt = eligible; FOS decides)"
  tags: [DISP, FOS, eligible-complainant, small-business, jurisdiction]

# ─────────────────────────────────────────────────────────────────────────────
# SM&CR — SENIOR MANAGERS AND CERTIFICATION REGIME
# ─────────────────────────────────────────────────────────────────────────────

- id: E015
  question: >
    Under SM&CR, how quickly must a firm report a breach of the Conduct Rules
    by a Senior Manager, and how does this differ from the reporting timeframe
    for other certified staff?
  difficulty: easy
  type: factual
  expected_pages:
    - smcr-conduct-rules
  required_facts:
    - "A firm must report a Conduct Rules breach by a Senior Manager to the FCA within 7 business days of the breach being identified"
    - "Conduct Rules breaches by non-SM Certification staff and other in-scope employees are reported annually via the REP008 return — not on an individual basis"
    - "The 7-business-day window for Senior Managers reflects their higher accountability level and the FCA's supervisory interest in SM-level conduct issues"
    - "The trigger for the 7-day clock is the firm concluding that a breach occurred — not the date the breach occurred or the date it was first identified. Firms must not prolong the conclusion phase where evidence is clear."
  required_citations:
    - "COCON 11.1 (breach reporting)"
    - "SUP 10C.14 (7 business days for Senior Managers)"
  notes_for_reviewer: >
    Confirmed from wiki (smcr-conduct-rules.md): the 7-day clock starts when the firm
    'concludes' a breach occurred, not when it first 'identifies' the concern. The
    COCON 11.1 and SUP 10C.14 citations and the REP008 annual return for non-SM staff
    are stated in the wiki but their exact sub-rule accuracy should be verified against
    the FCA Handbook before production use.
  tags: [SM-and-CR, conduct-rules, breach-reporting, senior-managers]

- id: M020
  question: >
    A Senior Manager is personally investigated following a firm-wide AML failure
    that occurred during their tenure. What is the Duty of Responsibility and what
    must the Senior Manager demonstrate to avoid personal liability?
  difficulty: medium
  type: synthesis
  expected_pages:
    - smcr-senior-managers-regime
  required_facts:
    - "The Duty of Responsibility (FSMA 2000 s.66A) allows the FCA to take enforcement action against a Senior Manager personally where a firm commits a breach in an area of the SM's responsibility"
    - "The Duty of Responsibility does not impose strict liability — the SM can avoid personal liability by demonstrating they took reasonable steps to prevent the breach"
    - "The reasonable steps defence is a statutory defence — the burden of proof is on the Senior Manager to demonstrate it, not on the FCA to disprove it"
    - "Reasonable steps evidence typically includes: governance records showing the SM received appropriate information; evidence the SM asked the right questions; escalation actions taken; policies approved and reviewed"
    - "Undocumented actions cannot be relied upon as evidence of reasonable steps — if the SM cannot prove they acted, the Duty of Responsibility provides no protection"
  required_citations:
    - "FSMA 2000 s.66A (Duty of Responsibility)"
  tags: [SM-and-CR, Duty-of-Responsibility, accountability, senior-managers, AML]

- id: M021
  question: >
    Does the SM&CR Senior Managers Regime apply to payment institutions and
    e-money institutions? What conduct framework applies to them instead?
  difficulty: medium
  type: boundary
  expected_pages:
    - smcr-senior-managers-regime
    - smcr-conduct-rules
  required_facts:
    - "No — the SM&CR Senior Managers Regime applies only to FSMA-authorised firms; it does not extend to payment institutions and e-money institutions authorised under the PSRs 2017 or EMRs 2011"
    - "PIs and EMIs are not subject to the Approved Persons regime, the Certification Regime, or the Senior Managers Regime under SM&CR"
    - "PIs and EMIs are subject to the FCA's Principles for Businesses (PRIN), including Principle 2A (Consumer Duty where it applies), and the conduct standards in the PSRs/EMRs and the Approach Document"
    - "The Individual Conduct Rule 6 (act to deliver good outcomes for retail customers) under Consumer Duty applies to FSMA firms — its application to PI/EMI staff is through the Consumer Duty framework, not through SM&CR directly"
  required_citations:
    - "FSMA 2000 (SM&CR scope — FSMA-authorised firms only)"
    - "FCA Guide for Solo-Regulated Firms (SM&CR scope)"
  tags: [SM-and-CR, PSR, EMI, scope, payment-institutions]

- id: H013
  question: >
    A firm's Head of Legal is proposed as a Senior Manager under SM&CR. The firm
    wants to allocate the 'Overall Responsibility' Prescribed Responsibility to
    them, covering all regulated activities. Is this permissible?
  difficulty: hard
  type: edge-case
  expected_pages:
    - smcr-senior-managers-regime
  required_facts:
    - "No — the Head of Legal is expressly excluded from SM approval across all tiers on legal privilege grounds; they cannot hold an SMF designation regardless of the breadth of their responsibilities"
    - "The Head of Legal is not outside the SM&CR entirely — they are included in the Certification Regime and are subject to Conduct Rules; the exclusion is from the Senior Managers Regime (SMF approval) only"
    - "Even if the Head of Legal were eligible, Overall Responsibility is an Enhanced-only requirement (SYSC 25) — it does not exist in Core firms"
    - "Overall Responsibility requires that every regulated activity and business area has a named SM accountable for it — it is allocated per area, not as a blanket designation to one person covering all regulated activities"
  required_citations:
    - "SYSC 25 (Enhanced firms — Overall Responsibility)"
    - "FCA Guide for Solo-Regulated Firms (Head of Legal exclusion — legal privilege grounds)"
  notes_for_reviewer: >
    Confirmed from wiki (smcr-senior-managers-regime.md): 'Head of Legal is expressly
    excluded from SM approval across all tiers (legal privilege grounds).' The wiki
    does not qualify this with 'only where responsibilities are limited to legal advice'
    — the exclusion is express and unconditional in the wiki's statement. The wiki also
    confirms the Head of Legal IS in the Certification Regime and subject to Conduct
    Rules. Verify the exact scope of the exclusion against the FCA Guide §4 or FSMA
    s.59 before production use.
  tags: [SM-and-CR, senior-managers, Head-of-Legal, Overall-Responsibility, Enhanced]

# ─────────────────────────────────────────────────────────────────────────────
# PRIN — PRINCIPLES FOR BUSINESSES
# ─────────────────────────────────────────────────────────────────────────────

- id: E016
  question: >
    A retail customer suffers financial loss as a result of a firm breaching
    Principle 12 (Consumer Duty). Can the customer sue the firm for damages
    in court under FSMA?
  difficulty: easy
  type: factual
  expected_pages:
    - prin-principles-overview
    - consumer-principle
  required_facts:
    - "No — there is no private right of action for breach of the FCA's Principles for Businesses, including Principle 12"
    - "PRIN 3.4.4R expressly removes any right of action under FSMA s.138D for a breach of any of the Principles"
    - "Retail customers cannot sue the firm in court for Principle 12 breach — their remedies are to complain to the firm, refer to the Financial Ombudsman Service, or rely on separate private law claims that are not based on the Principle itself"
    - "FCA enforcement action (including redress requirements) remains available — the exclusion of private action applies to the customer, not to the FCA"
  required_citations:
    - "PRIN 3.4.4R (no private right of action)"
    - "FSMA 2000 s.138D"
  tags: [PRIN, Consumer-Duty, private-right-of-action, FSMA]

- id: M022
  question: >
    A firm is authorised as an electronic money institution under the EMRs 2011.
    Does Principle 12 (Consumer Duty) apply to it, and under which provision?
  difficulty: medium
  type: boundary
  expected_pages:
    - prin-principles-overview
    - prin3-rules-about-application
  required_facts:
    - "Yes — Principle 12 and the PRIN 2A Consumer Duty rules apply to EMIs"
    - "PRIN 3.1.1AR is a hard rule that expressly brings EMIs, PIs, and RAISPs within the scope of the Principles, including Principle 12"
    - "The application of PRIN to EMIs is not merely by implication from the PSRs/EMRs — it is an explicit hard rule in PRIN itself"
    - "The Consumer Duty applies to EMIs in respect of their retail customers — the retail customer definition for EMIs is set out in the PSRs/EMRs, not the general COBS definition"
    - "Principle 6 and Principle 7 are displaced by Principle 12 where the Consumer Duty applies — both cannot operate simultaneously for the same activity (PRIN 3.2.10R)"
  required_citations:
    - "PRIN 3.1.1AR (EMIs/PIs/RAISPs within PRIN)"
    - "PRIN 3.2.10R (P6/P7 displacement)"
  tags: [PRIN, Consumer-Duty, EMI, scope, payment-institutions]

- id: H014
  question: >
    A firm in a distribution chain discovers that the manufacturer of a product
    it distributes appears to be breaching Principle 12. What specific obligation
    does PRIN 2A impose on the distributing firm?
  difficulty: hard
  type: edge-case
  expected_pages:
    - prin2a-consumer-duty
    - consumer-principle
  required_facts:
    - "PRIN 2A.9.17R imposes a mandatory notification obligation: a firm in a distribution chain that becomes aware that another firm in the chain may be breaching Principle 12 or PRIN 2A must notify the FCA immediately"
    - "There is no materiality threshold — the obligation to notify arises on becoming aware of a possible breach, not only when a breach is confirmed"
    - "The obligation is on the distributing firm itself — it cannot rely on the manufacturer to self-report"
    - "This obligation is separate from and additional to the distributor's own Consumer Duty obligations (including the obligation not to distribute a product to customers outside the target market)"
    - "A firm that becomes aware of a potential Principle 12 breach by another chain participant and does not notify the FCA is itself potentially in breach of PRIN 2A.9.17R"
  required_citations:
    - "PRIN 2A.9.17R (FCA notification duty in distribution chains)"
  tags: [PRIN, Consumer-Duty, distribution-chain, FCA-notification]

# ─────────────────────────────────────────────────────────────────────────────
# SYSC — SYSTEMS AND CONTROLS
# ─────────────────────────────────────────────────────────────────────────────

- id: E017
  question: >
    Under SYSC 10, what is the correct sequence a firm must follow when it
    identifies a conflict of interest, and what is the status of client
    disclosure within that sequence?
  difficulty: easy
  type: factual
  expected_pages:
    - sysc10-conflicts-of-interest
  required_facts:
    - "The mandatory sequence is: identify → manage → disclose. All three steps are required in order"
    - "A firm must first identify conflicts (SYSC 10.1.3R — the duty is prospective, covering conflicts that arise or may arise)"
    - "The firm must then manage the conflict using appropriate measures (SYSC 10.1.7R) — disclosure is not an alternative to management"
    - "Disclosure to the client is the last resort under SYSC 10.1.9AR — it may only be used where the conflict cannot be adequately managed. A firm that skips management and proceeds directly to disclosure breaches SYSC 10.1.9AR regardless of the accuracy of the disclosure"
    - "Managing a conflict means using organisational or administrative measures to prevent it adversely affecting clients — examples include information barriers, independent oversight, or remuneration adjustments"
  required_citations:
    - "SYSC 10.1.3R (identification duty)"
    - "SYSC 10.1.7R (management obligation)"
    - "SYSC 10.1.9AR (disclosure as last resort)"
  tags: [SYSC, conflicts-of-interest, identify-manage-disclose]

- id: M023
  question: >
    A MiFID investment firm deletes email records relating to a client order from
    three years ago to free up storage. What specific SYSC 9 obligations has it
    potentially breached, and what is the minimum retention period that applied?
  difficulty: medium
  type: factual
  expected_pages:
    - sysc9-record-keeping
  required_facts:
    - "MiFID and common platform firms are subject to a mandatory minimum 5-year retention period for records of the services they provide and transactions they undertake (SYSC 9.1.2R)"
    - "Deleting records after 3 years breaches the 5-year minimum retention obligation"
    - "MiFID firms must also comply with SYSC 9.1.2-AR: records must be stored in a form that prevents firm-level alteration or deletion, is promptly accessible by the FCA on request, and can be reconstituted in an intelligible form"
    - "The deletion of records may itself breach SYSC 9.1.2-AR if the records were required to be held in tamper-proof storage — the obligation is not merely to retain for 5 years but to retain in a form the firm cannot unilaterally alter"
    - "Non-MiFID firms are subject to a general duty to retain records 'as long as they are relevant' (SYSC 9.1.5G) — a more flexible standard with no prescribed minimum period"
  required_citations:
    - "SYSC 9.1.2R (5-year MiFID retention)"
    - "SYSC 9.1.2-AR (tamper-proof storage)"
  tags: [SYSC, record-keeping, MiFID, retention, tamper-proof]

- id: H015
  question: >
    A conflicts register maintained under SYSC 10.1.6R has not been reviewed or
    updated for 18 months. The firm argues that no new conflicts have arisen so
    no update was needed, and that senior management receives a verbal briefing
    on conflicts quarterly. What specific obligations has the firm breached?
  difficulty: hard
  type: edge-case
  expected_pages:
    - sysc10-conflicts-of-interest
  required_facts:
    - "The conflicts register under SYSC 10.1.6R must be a live document — it must be kept current. An 18-month gap without review or update is likely a breach regardless of whether new conflicts have arisen, because the firm cannot demonstrate it has actively monitored for changes"
    - "SYSC 10.1.6AAR imposes a separate obligation: the firm must produce a written annual report on conflicts of interest to senior management — this is distinct from the live register and cannot be satisfied by verbal briefings"
    - "A verbal quarterly briefing does not satisfy SYSC 10.1.6AAR — the obligation requires a written report, and it must be at least annual"
    - "The written policy on conflicts (SYSC 10.1.10R) must be reviewed annually (SYSC 10.1.11AAR) — a related obligation that may also be in breach if 18 months have passed without review"
    - "The conflicts register and the annual written SM report are two discrete obligations — maintaining one does not satisfy the other"
  required_citations:
    - "SYSC 10.1.6R (conflicts register)"
    - "SYSC 10.1.6AAR (annual written report to senior management)"
    - "SYSC 10.1.11AAR (annual policy review)"
  tags: [SYSC, conflicts-of-interest, conflicts-register, annual-report]

# ─────────────────────────────────────────────────────────────────────────────
# CRYPTOASSETS — PS23/6 FINANCIAL PROMOTION RULES
# ─────────────────────────────────────────────────────────────────────────────

- id: E018
  question: >
    Under the FCA's cryptoasset financial promotion rules, an MLR-registered
    cryptoasset business offers a £50 cash bonus to new customers who make
    their first trade within 30 days of signing up. Is this permitted?
  difficulty: easy
  type: factual
  expected_pages:
    - cryptoasset-financial-promotions-framework
    - ps23-6-cryptoasset-financial-promotions
  required_facts:
    - "No — this is prohibited under the absolute incentives ban in PS23/6"
    - "The incentives ban applies to all financial promotions for qualifying cryptoassets — cash bonuses, refer-a-friend bonuses, new-joiner bonuses, and 'free' token offers are all prohibited"
    - "Unlike other restricted mass-market investments, there is no shareholder benefit exemption for cryptoassets — benefits available to shareholders are not carved out"
    - "The prohibition applies to MLR-registered cryptoasset businesses communicating their own promotions under the Article 73ZA exemption — the same rules apply to them as to authorised firms"
    - "A time-limited nature of the bonus does not create an exemption — benefits available only for a limited period are likely to be incentives regardless of their form"
  required_citations:
    - "PS23/6 §3.24 (absolute incentives ban)"
    - "FCA Handbook COBS 4.12A (incentives prohibition)"
  tags: [cryptoassets, financial-promotions, incentives-ban, PS23-6]

- id: M024
  question: >
    A cryptoasset firm onboards a new retail customer who wishes to invest.
    The customer claims to be a self-certified sophisticated investor and provides
    a signed declaration. Can the firm treat this customer as a sophisticated
    investor and skip the appropriateness assessment?
  difficulty: medium
  type: edge-case
  expected_pages:
    - cryptoasset-financial-promotions-framework
  required_facts:
    - "No — the self-certified sophisticated investor category is disapplied for cryptoassets under PS23/6"
    - "Only three client categories are available for cryptoasset financial promotions: Restricted Investor, High Net Worth Investor, and Certified Sophisticated Investor (certified by a firm, not self-certified)"
    - "The self-certified sophisticated investor category was disapplied because the existing criteria (syndicate membership, business angel network membership) are not appropriate proxies for cryptoasset investment sophistication"
    - "A signed self-certification declaration from the customer does not satisfy the Certified Sophisticated Investor category — that category requires firm-level certification based on the customer's actual knowledge and experience"
    - "The appropriateness assessment is mandatory for all three permitted categories — it cannot be skipped even for High Net Worth or Certified Sophisticated customers"
  required_citations:
    - "PS23/6 §3.46 (self-certified sophisticated investor disapplied)"
    - "FCA Handbook COBS 4.12A (client categorisation for cryptoassets)"
  tags: [cryptoassets, financial-promotions, client-categorisation, appropriateness, PS23-6]

- id: H016
  question: >
    A cryptoasset firm communicates a direct offer financial promotion (DOFP) to
    a retail customer. The customer fails the appropriateness assessment on their
    first attempt and immediately retakes it — passing on the second try five
    minutes later. The firm processes the customer's investment. Has the firm
    complied with PS23/6?
  difficulty: hard
  type: edge-case
  expected_pages:
    - cryptoasset-financial-promotions-framework
  required_facts:
    - "No — the firm has not complied with PS23/6"
    - "After a failed appropriateness assessment, a mandatory 24-hour lock-out applies from the second failed attempt — but the FCA's anti-gaming rules also require that different questions be used on each attempt"
    - "Even if a 24-hour lock-out had not yet triggered, the firm must not encourage customers to retake the assessment and must not disclose the specific answers that were wrong — only the broad topic areas where the customer failed"
    - "Five minutes between attempts strongly suggests the customer was coached or that the same questions were reused — both are named rule breaches under PS23/6 §§3.50–3.53"
    - "For first-time investors with the firm, a mandatory 24-hour cooling-off period also applies from the point the DOFP was communicated — the time spent on appropriateness assessments counts toward the cooling-off period, so a 5-minute reassessment cannot satisfy the 24-hour cooling-off requirement"
    - "The firm should not have processed the investment: the cooling-off period had not expired and the appropriateness process had not been properly completed"
  required_citations:
    - "PS23/6 §§3.50–3.53 (appropriateness anti-gaming rules)"
    - "PS23/6 §3.19 (24-hour cooling-off for first-time investors)"
  tags: [cryptoassets, financial-promotions, appropriateness, cooling-off, anti-gaming, PS23-6]
