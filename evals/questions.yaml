- id: E011
  question: >
    Under UK GDPR Article 5, what is the storage limitation principle and
    what does it require in practice?
  difficulty: easy
  type: factual
  expected_pages:
    - uk-gdpr-data-protection-principles
  required_facts:
    - "Personal data must be kept in a form that permits identification of data subjects for no longer than is necessary for the purposes for which the data are processed"
    - "There are no prescribed retention periods in the UK GDPR — firms must determine the appropriate period themselves based on the purpose"
    - "Pseudonymisation does not exempt data from the storage limitation principle — pseudonymised data can still identify individuals with additional information and remains personal data"
    - "Archiving in the public interest, scientific or historical research, and statistical purposes are exceptions — but only where appropriate safeguards are in place and the data is used solely for those purposes"
    - "A mandatory breach register must be maintained for all personal data breaches regardless of whether they are notified to the ICO — there is no threshold for recording"
  required_citations:
    - "UK GDPR Art. 5(1)(e)"
  notes_for_reviewer: >
    The last required_fact (breach register) is from Art. 33(5) not Art. 5(1)(e) —
    it was included in the wiki's storage limitation coverage as a related record-keeping
    point. Remove that bullet or re-attribute it to Art. 33(5) if the question is
    scoped strictly to Art. 5(1)(e). The pseudonymisation point is a named ICO finding
    in the wiki — verify it is stated in the Art. 5(1)(e) guidance specifically.
  tags: [UK-GDPR, data-protection-principles, storage-limitation]

