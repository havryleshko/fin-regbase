    - "Method 2 (insurance or comparable guarantee): relevant funds must be covered by an insurance policy or comparable guarantee from an authorised insurer or credit institution that is not in the same group as the PI or EMI"
    - "Daily reconciliation of safeguarded funds is required regardless of which method is used"
    - "An annual independent safeguarding audit is required"
