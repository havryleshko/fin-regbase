    - "The fact that the respondent institution processes transactions for shell banks as part of its own business means the firm's correspondent relationship indirectly facilitates shell bank activity — this is sufficient reason to refuse or terminate the relationship"
    - "If the relationship already exists, the firm must terminate it — not merely apply enhanced monitoring"
