- id: H011
  question: >
    An employee at a regulated firm suspects a customer is laundering money but
    has not yet reported internally to the MLRO. A colleague in the same team
    asks the employee directly: 'Is there a problem with this customer's account?'
    What are the tipping-off risks, and what can the employee say?
  difficulty: hard
  type: edge-case
  expected_pages:
    - sar-consent-tipping-off
  required_facts:
    - "Tipping-off under POCA 2002 s.333A prohibits disclosing that a SAR has been filed or that an investigation is being contemplated or carried out — but no SAR has been filed yet in this scenario, so s.333A does not technically apply at this moment"
    - "However, the failure to disclose offence under POCA 2002 s.330 applies to regulated sector employees — the employee has an obligation to report to the MLRO as soon as practicable once suspicion arises"
    - "Once the employee has reported to the MLRO, the intra-firm disclosure exemption under POCA 2002 s.333B(1) permits an employee, officer, or partner to disclose information to another employee, officer, or partner of the same firm — intra-firm AML compliance discussions are a permitted disclosure, not tipping-off"
    - "The employee should not confirm or deny any specific concern to the colleague before reporting to the MLRO — this avoids any risk that the information reaches the customer before the MLRO has evaluated the position"
    - "The correct sequence: report to MLRO first, then the intra-firm permitted disclosure carve-out under s.333B(1) allows the discussion to occur within the firm's AML compliance function"
  required_citations:
    - "POCA 2002 s.330 (failure to disclose)"
    - "POCA 2002 s.333A (tipping-off offences)"
    - "POCA 2002 s.333B(1) (intra-firm disclosure exemption)"
  notes_for_reviewer: >
    Confirmed from wiki (sar-consent-tipping-off.md): the intra-firm disclosure
    exemption is POCA 2002 s.333B(1) (disclosure by an employee, officer or partner
    to another employee, officer or partner of the same firm), not s.337. POCA s.337
    covers disclosures TO a nominated officer (MLRO) — a different provision. The
    sequencing (s.333A doesn't apply until a SAR exists; s.330 applies on suspicion;
    s.333B(1) permits intra-firm AML compliance discussion) is confirmed by the wiki.
  tags: [AML, SAR, tipping-off, POCA-2002, intra-firm-disclosure]

