    - "MLR 2017 reg. 40 requires firms to retain SAR-related records for a minimum of five years from the end of the business relationship or transaction — this legal obligation displaces the erasure right"
    - "The legal claims exemption (Art. 17(3)(e)) may also apply if the SAR data is relevant to potential legal proceedings"
    - "There is a second complication: the firm must not disclose to the customer that a SAR exists or was filed — responding to the erasure request in a way that confirms or implies a SAR was made could constitute tipping-off under POCA 2002 s.333A"
