- id: M014
  question: >
    The Data (Use and Access) Act 2025 introduced a new Article 6 basis called
    'recognised legitimate interest'. How does it differ from the existing
    legitimate interests basis, and which of its pre-approved purposes is most
    relevant to financial services firms?
  difficulty: medium
  type: factual
  expected_pages:
    - uk-gdpr-lawful-basis
    - ico-guide-lawful-basis-2026
  required_facts:
    - "Recognised legitimate interest (Art. 6(ea)) is a new basis introduced by the DUA Act 2025 — unlike ordinary legitimate interests (Art. 6(1)(f)), it does not require the firm to conduct a balancing test against the individual's interests"
    - "The basis applies only where the processing falls within one of five pre-approved purposes listed in the Act — it is not available for general commercial processing"
    - "The five pre-approved purposes are: (1) Safeguarding vulnerable people; (2) Responding to emergencies; (3) Preventing or investigating crime; (4) National security, public security and defence; (5) Sharing personal data with a public task organisation at that organisation's request"
    - "Purposes 1 (safeguarding), 3 (crime prevention/financial crime investigation), and 5 (sharing with public task organisations such as the FCA, NCA, and OFSI) are most directly relevant to financial services firms"
    - "Even under Art. 6(ea), a separate condition under Art. 9 must be identified if special category data is involved"
  required_citations:
    - "UK GDPR Art. 6(ea) (as inserted by DUA Act 2025)"
  notes_for_reviewer: >
    The five pre-approved purposes are confirmed from the wiki (uk-gdpr-lawful-basis.md)
    which derives from ICO guidance updated April 2026. The exact wording is:
    (1) Safeguarding vulnerable people; (2) Responding to emergencies;
    (3) Preventing or investigating crime; (4) National security, public security and
    defence; (5) Sharing personal data with a public task organisation at that
    organisation's request. The claim that no balancing test is required under
    Art. 6(ea) is confirmed by the wiki. The Act is the Data (Use and Access) Act 2025
    (Royal Assent 2025) — not 2026.
  tags: [UK-GDPR, DUA-Act, lawful-basis, recognised-legitimate-interest]

- id: M015
  question: >
    A firm wants to use customer data originally collected for AML/KYC purposes
    to train an internal fraud detection model. Under the UK GDPR purpose
    limitation principle, is this permitted and what assessment is required?
  difficulty: medium
  type: synthesis
  expected_pages:
    - uk-gdpr-data-protection-principles
    - uk-gdpr-lawful-basis
  required_facts:
    - "Processing for a new purpose requires a compatibility assessment unless the customer has given specific consent to the new purpose, or the new purpose falls within an Annex 2 compatible purpose under the DUA Act 2025"
    - "The five-factor compatibility assessment considers: link between original and new purposes; context of collection and reasonable expectations; nature of the data; consequences of further processing; existence of appropriate safeguards"
    - "AML/KYC data is collected under legal obligation (Art. 6(1)(c)) — using it for fraud model training is a different purpose, and switching to legitimate interests as the basis after original collection under legal obligation is not straightforward"
    - "Fraud detection may fall within DUA Act 2025 Annex 2 compatible purpose 1 ('Preventing or detecting crime or other unlawful behaviour') — fraud detection is not named as a distinct Annex 2 purpose but falls within this broader crime prevention purpose; the firm must assess whether its specific fraud model use falls within purpose 1"
    - "Even if compatible processing is established, the firm must still meet transparency obligations — customers must be informed of the new purpose"
  required_citations:
    - "UK GDPR Art. 5(1)(b) (purpose limitation)"
    - "UK GDPR Art. 6(4) (compatibility assessment)"
  notes_for_reviewer: >
    Verified: Annex 2 purpose 1 is 'Preventing or detecting crime or other unlawful
    behaviour' — this covers fraud detection but fraud detection is not named as a
    discrete Annex 2 purpose. The question correctly attributes this to the DUA Act 2025
    (Royal Assent 2025). The nine Annex 2 compatible purposes are not all enumerated in
    the wiki index — confirm the full list from uk-gdpr-data-protection-principles.md or
    primary legislation if this question is used in production.
  tags: [UK-GDPR, purpose-limitation, AML, fraud-detection, DUA-Act]

- id: H009
  question: >
