    - "A credit application is typically ground (1) — necessary for entering into a contract — which is the most commonly used ground for automated credit decisions"
    - "The firm must implement suitable safeguards including: the right to obtain human review of the decision; the right to express the data subject's point of view; and the right to contest the decision"
