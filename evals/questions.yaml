    - "Where no natural person meets the 25% threshold after exhausting the ownership chain, the firm must identify the senior managing official(s) of the legal person as the beneficial owner"
    - "The firm must document why no natural person met the threshold — the fallback to senior managing officials is not a first resort"
    - "For trusts: the firm must identify the settlor, trustees, protector (if any), beneficiaries or class of beneficiaries, and any person exercising effective control"
